<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <circle cx="40" cy="40" r="40" fill="#D6E8F5"/>
  <!-- corpo / camisa social -->
  <ellipse cx="40" cy="72" rx="22" ry="14" fill="#2C5F8A"/>
  <!-- colarinho camisa -->
  <path d="M31 62 L40 70 L49 62 L46 58 L40 63 L34 58 Z" fill="white" opacity=".95"/>
  <!-- pescoço -->
  <rect x="34" y="53" width="12" height="11" rx="4" fill="#D4A574"/>
  <!-- rosto mais maduro, levemente quadrado -->
  <rect x="22" y="26" width="36" height="32" rx="10" fill="#D4A574"/>
  <!-- cabelo grisalho curto nas laterais -->
  <rect x="22" y="26" width="8" height="16" rx="4" fill="#9B9B9B"/>
  <rect x="50" y="26" width="8" height="16" rx="4" fill="#9B9B9B"/>
  <!-- topo calvo com pouco cabelo -->
  <ellipse cx="40" cy="25" rx="14" ry="7" fill="#8A8A8A"/>
  <!-- rugas sutis na testa -->
  <path d="M30 32 Q40 30 50 32" stroke="#B8845A" stroke-width=".7" fill="none" opacity=".5"/>
  <!-- sobrancelhas grisalhas e grossas -->
  <path d="M27 34 Q32 31 38 33" stroke="#888" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M42 33 Q48 31 53 34" stroke="#888" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- olhos mais fundos -->
  <ellipse cx="33" cy="39" rx="4.5" ry="3.5" fill="white"/>
  <ellipse cx="47" cy="39" rx="4.5" ry="3.5" fill="white"/>
  <circle cx="33" cy="39" r="2.5" fill="#3D2510"/>
  <circle cx="47" cy="39" r="2.5" fill="#3D2510"/>
  <circle cx="34" cy="38" r=".7" fill="white"/>
  <circle cx="48" cy="38" r=".7" fill="white"/>
  <!-- nariz largo -->
  <path d="M38 43 Q37 47 40 48 Q43 47 42 43" stroke="#A87040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <ellipse cx="37.5" cy="48" rx="2.2" ry="1.3" fill="#A87040" opacity=".25"/>
  <ellipse cx="42.5" cy="48" rx="2.2" ry="1.3" fill="#A87040" opacity=".25"/>
  <!-- bigode / barba grisalha sutil -->
  <path d="M33 51 Q40 49 47 51" stroke="#999" stroke-width="1" fill="none" opacity=".6"/>
  <!-- sorriso sábio fechado -->
  <path d="M33 53 Q40 57 47 53" stroke="#8B5A2B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>