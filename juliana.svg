  <circle cx="30.5" cy="37" r="2" fill="#3D2A1A"/>
  <circle cx="44.5" cy="37" r="2" fill="#3D2A1A"/>
  <circle cx="31.2" cy="36.3" r=".6" fill="white"/>
  <circle cx="45.2" cy="36.3" r=".6" fill="white"/>
  <!-- sobrancelhas -->
  <path d="M26 32 Q30.5 30 35 31.5" stroke="#1C1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M40 31.5 Q44.5 30 49 32" stroke="#1C1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- nariz delicado -->
  <path d="M39 43 Q40 46 41 43" stroke="#C8906A" stroke-width="1" fill="none"/>
  <!-- bochechas suaves -->
  <ellipse cx="27" cy="44" rx="5" ry="3" fill="#FFB0B0" opacity=".35"/>
  <ellipse cx="53" cy="44" rx="5" ry="3" fill="#FFB0B0" opacity=".35"/>
  <!-- sorriso gentil -->
  <path d="M32 49 Q40 55 48 49" stroke="#B06848" stroke-width="1.8" fill="none" stroke-linecap="round"/>
