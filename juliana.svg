  <ellipse cx="40" cy="24" rx="17" ry="7" fill="#1C1008"/>
  <!-- óculos (educadora) -->
  <rect x="25" y="33" width="11" height="8" rx="3" fill="none" stroke="#6B4E8A" stroke-width="1.8"/>
  <rect x="39" y="33" width="11" height="8" rx="3" fill="none" stroke="#6B4E8A" stroke-width="1.8"/>
